name: CI

# 营销站唯一持久质量兜底（对齐 hachimi-ios / hachimi-backend 单 job 取向）。
# 只把关“能否干净构建”：format + lint + typecheck + 静态导出 build；不做部署（Cloudflare Pages 由 push main Git 集成自动构建，见 deploy/cloudflare-pages.md）。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支新 push 取消旧跑。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: format + lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # 锁 Node 24 LTS（非本机 Current 26）：CI 重在可复现。npm 缓存走 lockfile。
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      # prettier --check + lint + tsc --noEmit + next build（静态导出）。任一失败 → 非零退出 → CI 红。
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
